name: FallenEconomy
version: 1.4.11
main: dev.fallen.economy.FallenEconomyPlugin
api-version: '1.21'
authors:
  - Fallen
  - RimumuruDev
  - APonder
softdepend:
  - Vault
  - PlayerPoints
commands:
  shop:
    description: Opens the native Fallen shop.
    usage: /shop
  sell:
    description: Opens sell values or sells items for money.
    usage: /sell
  essence:
    description: Shows your Essence balance from PlayerPoints.
    usage: /essence
  essenceshop:
    description: Opens or configures the Fallen Essence shop.
    usage: /essenceshop
  ah:
    description: Opens the Fallen auction house.
    usage: /ah
    aliases:
      - auction
      - auctions
  order:
    description: Opens or manages Fallen buy orders.
    usage: /order
    aliases:
      - orders
  feconomy:
    description: Admin economy tools for Fallen Economy internal balances.
    usage: /feconomy
  balance:
    description: Shows your money balance.
    usage: /balance
    aliases:
      - bal
      - money
  pay:
    description: Pays money to another online player.
    usage: /pay <player> <amount>
permissions:
  falleneconomy.buy:
    default: true
  falleneconomy.buy.config:
    default: op
  falleneconomy.sell:
    default: true
  falleneconomy.essence:
    default: true
  falleneconomy.essenceshop:
    default: true
  falleneconomy.essenceshop.config:
    default: op
  falleneconomy.balance:
    default: true
  falleneconomy.pay:
    default: true
  falleneconomy.ah:
    default: true
  falleneconomy.ah.sell:
    default: true
  falleneconomy.order:
    default: true
  falleneconomy.order.create:
    default: true
  falleneconomy.admin:
    default: op
  falleneconomy.tools.pickaxe:
    default: true
  falleneconomy.tools.shovel:
    default: true
  falleneconomy.tools.axe:
    default: true
  falleneconomy.tools.sellwand:
    default: true
